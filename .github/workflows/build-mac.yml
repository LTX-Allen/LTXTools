name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 安装 .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: 安装 MAUI 工作负载
      run: |
        dotnet workload install maui --ignore-failed-sources
        dotnet workload install maccatalyst --ignore-failed-sources
    
    - name: 查看文件结构
      run: |
        echo "=== 当前目录 ==="
        ls -la
        echo "=== Platforms 目录 ==="
        ls -la Platforms/ || echo "Platforms 不存在"
        echo "=== MacCatalyst 目录 ==="
        ls -la Platforms/MacCatalyst/ || echo "MacCatalyst 不存在"
    
    - name: 查看项目文件
      run: cat LTXTools.csproj
    
    - name: 还原依赖
      run: dotnet restore
    
    - name: 构建
      run: dotnet build -c Release --no-restore
    
    - name: 发布为 .app
      run: |
        dotnet publish -c Release -p:CreatePackage=false --no-restore -o ./publish
        echo "=== 发布后的文件 ==="
        ls -la ./publish/
    
    - name: 查找 .app 文件
      run: |
        echo "=== 查找所有 .app 文件 ==="
        find . -name "*.app" -type d 2>/dev/null || echo "未找到 .app 文件"
    
    - name: 创建 .dmg
      run: |
        echo "=== 查找 .app 文件 ==="
        APP_PATH=$(find ./publish -name "*.app" -type d | head -1)
        echo "找到: $APP_PATH"
        
        if [ -n "$APP_PATH" ]; then
          echo "=== 复制 .app 到根目录 ==="
          cp -R "$APP_PATH" ./LTXTools.app
          
          echo "=== 创建 .dmg ==="
          hdiutil create -srcfolder ./LTXTools.app -volname "LTX工具集" -format UDZO LTX工具集.dmg -ov
          
          echo "=== 检查结果 ==="
          ls -la *.dmg
          
          if [ -f "./LTX工具集.dmg" ]; then
            echo "✅ .dmg 创建成功"
            du -sh ./LTX工具集.dmg
          else
            echo "❌ .dmg 创建失败"
            exit 1
          fi
        else
          echo "❌ 未找到 .app 文件"
          echo "=== 完整目录树 ==="
          find . -type d | head -30
          exit 1
        fi
    
    - name: 上传 .app
      uses: actions/upload-artifact@v4
      with:
        name: LTXTools-app
        path: ./LTXTools.app
    
    - name: 上传 .dmg
      uses: actions/upload-artifact@v4
      with:
        name: LTXTools-dmg
        path: ./*.dmg
