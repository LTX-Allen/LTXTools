name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 安装 .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: 安装 MAUI 工作负载
      run: |
        dotnet workload install maui --ignore-failed-sources
        dotnet workload install maccatalyst --ignore-failed-sources
    
    - name: 查看文件结构
      run: ls -la
    
    - name: 还原依赖（关键步骤！）
      run: dotnet restore -f net9.0-maccatalyst
    
    - name: 构建
      run: dotnet build -f net9.0-maccatalyst -c Release --no-restore
    
    - name: 发布为 .app
      run: dotnet publish -f net9.0-maccatalyst -c Release -p:CreatePackage=false --no-restore -o ./publish
    
    - name: 查看发布文件
      run: ls -la ./publish/
    
    - name: 创建 .dmg
      run: |
        if [ -d "./publish/LTXTools.app" ]; then
          hdiutil create -srcfolder ./publish/LTXTools.app -volname "LTX工具集" -format UDZO LTX工具集.dmg
        else
          echo "LTXTools.app 不存在，查看目录内容："
          ls -la ./publish/
          exit 1
        fi
    
    - name: 上传 .app
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: LTXTools-app
        path: ./publish/LTXTools.app
    
    - name: 上传 .dmg
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: LTXTools-dmg
        path: ./*.dmg
