name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 安装 .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: 安装 MAUI 工作负载
      run: |
        dotnet workload install maui --ignore-failed-sources
        dotnet workload install maccatalyst --ignore-failed-sources
    
    - name: 查看项目结构（调试）
      run: |
        echo "=== 当前目录 ==="
        ls -la
        echo "=== Platforms 目录 ==="
        ls -la Platforms/ || echo "Platforms 不存在"
        echo "=== MacCatalyst 目录 ==="
        ls -la Platforms/MacCatalyst/ || echo "MacCatalyst 不存在"
        echo "=== 项目文件 ==="
        cat LTXTools.csproj | head -30
    
    - name: 还原依赖
      run: dotnet restore
    
    - name: 构建
      run: dotnet build -c Release --no-restore
    
    - name: 发布为 .app
      run: |
        echo "=== 开始发布 ==="
        # 使用 -p:RuntimeIdentifier=maccatalyst-x64
        dotnet publish -c Release -p:CreatePackage=false -p:RuntimeIdentifier=maccatalyst-x64 -o ./publish --no-restore
        
        echo "=== 检查 publish 目录 ==="
        if [ -d "./publish" ]; then
          echo "✅ publish 目录已创建"
          ls -la ./publish/
          # 如果 publish 为空，搜索整个项目
          if [ -z "$(ls -A ./publish)" ]; then
            echo "⚠️ publish 目录为空，搜索整个项目"
            find . -name "*.app" -type d
          fi
        else
          echo "❌ publish 目录不存在"
          # 搜索整个项目中的 .app
          echo "=== 搜索整个项目的 .app ==="
          find . -name "*.app" -type d
          exit 1
        fi
    
    - name: 查找 .app
      run: |
        echo "=== 查找所有 .app 文件 ==="
        APP_PATH=$(find . -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "✅ 找到: $APP_PATH"
        else
          echo "❌ 未找到 .app"
          # 列出所有可能的输出目录
          echo "=== 列出所有目录 ==="
          find . -type d | head -30
          exit 1
        fi
    
    - name: 创建 .dmg
      run: |
        APP_PATH=$(find . -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "✅ 找到 .app: $APP_PATH"
          cp -R "$APP_PATH" ./LTXTools.app
          echo "=== 创建 .dmg ==="
          hdiutil create -srcfolder ./LTXTools.app -volname "LTX工具集" -format UDZO LTX工具集.dmg -ov
          ls -la *.dmg
        else
          echo "❌ 未找到 .app 文件"
          exit 1
        fi
    
    - name: 上传 .app
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: LTXTools-app
        path: ./LTXTools.app
    
    - name: 上传 .dmg
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: LTXTools-dmg
        path: ./*.dmg
